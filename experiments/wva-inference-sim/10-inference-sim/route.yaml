apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: inference-sim-gateway
  namespace: openshift-ingress
spec:
  # Update this hostname to match your cluster's domain
  host: inference-sim-gateway.apps.YOUR-CLUSTER-DOMAIN-HERE
  to:
    kind: Service
    name: openshift-ai-inference-istio
    weight: 100
  port:
    targetPort: http
  wildcardPolicy: None
