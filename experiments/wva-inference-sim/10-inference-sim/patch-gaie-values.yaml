- op: replace
  path: /spec/sources/0/helm/valuesObject
  value:
    inferenceExtension:
      replicas: 1
      image:
        name: llm-d-inference-scheduler
        hub: ghcr.io/llm-d
        tag: v0.5.0
        pullPolicy: Always
      extProcPort: 9002
      pluginsConfigFile: "default-plugins.yaml"
      monitoring:
        interval: "10s"
        secret:
          name: inference-gateway-sa-metrics-reader-secret
        prometheus:
          enabled: true
    inferencePool:
      targetPortNumber: 8000
      modelServerType: vllm
      modelServers:
        matchLabels:
          llm-d.ai/inference-serving: "true"
    provider:
      name: istio
      istio:
        destinationRule:
          host: "inference-sim-scheduling-epp.experiment-02.svc.cluster.local"
          trafficPolicy:
            tls:
              mode: SIMPLE
              insecureSkipVerify: true
