apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: sim-autoscaling-test-wva-
  namespace: experiment-02
spec:
  params:
    - name: target-url
      value: 'http://inference-sim-gateway.apps.YOUR-CLUSTER-DOMAIN-HERE'
    - name: model
      value: meta-llama/Llama-3.1-8B
    - name: reset-llm-d
      value: 'true'
    - name: namespace
      value: experiment-02
    - name: test-name
      value: WVA-sim
    - name: scaled-object
      value: |
        apiVersion: keda.sh/v1alpha1
        kind: ScaledObject
        metadata:
          name: inference-sim-deployment-scaler
          namespace: experiment-02
          labels:
            app: inference-sim-decode
            scaler: keda-workload-variant-autoscaler
        spec:
          scaleTargetRef:
            apiVersion: apps/v1
            kind: Deployment
            name: inference-sim-decode
          pollingInterval: 10
          cooldownPeriod: 30
          initialCooldownPeriod: 30
          minReplicaCount: 1
          maxReplicaCount: 4
          fallback:
            failureThreshold: 3
            replicas: 1
            behavior: 'currentReplicasIfHigher'
          advanced:
            restoreToOriginalReplicaCount: false
            horizontalPodAutoscalerConfig:
              name: inference-sim-decode-hpa
              behavior:
                scaleDown:
                  stabilizationWindowSeconds: 60
                  policies:
                    - type: Percent
                      value: 100
                      periodSeconds: 30
                    - type: Pods
                      value: 1
                      periodSeconds: 15
                scaleUp:
                  stabilizationWindowSeconds: 0
                  policies:
                    - type: Percent
                      value: 100
                      periodSeconds: 30
                    - type: Pods
                      value: 1
                      periodSeconds: 15
          triggers:
            - type: prometheus
              name: wva-desired-replicas

              authenticationRef:
                name: keda-trigger-auth-prometheus
              metadata:
                serverAddress: 'https://thanos-querier.openshift-monitoring.svc.cluster.local:9091'
                query: |
                  wva_desired_replicas{
                    variant_name='inference-sim-decode',
                    exported_namespace='experiment-02'
                  }
                threshold: '1'
                activationThreshold: '0'
                metricType: 'AverageValue'
                authModes: 'bearer'
                unsafeSsl: 'true'
  pipelineRef:
    name: wva-sim-incremental-stepped-load-test
  taskRunTemplate:
    podTemplate:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - amd64
    serviceAccountName: pipeline
  timeouts:
    finally: 1h0m0s
    pipeline: 12h0m0s
    tasks: 4h0m0s
  workspaces:
    - name: shared-workspace
      volumeClaimTemplate:
        metadata:
          creationTimestamp: null
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
        status: {}
