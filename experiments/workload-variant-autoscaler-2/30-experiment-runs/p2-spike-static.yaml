apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: p2-spike-static-
  namespace: experiment-01
spec:
  params:
    - name: target-url
      value: 'http://openshift-ai-inference-istio.openshift-ingress.svc.cluster.local'
    - name: model
      value: Qwen/Qwen3-32B-AWQ
    - name: reset-llm-d
      value: 'true'
    - name: namespace
      value: experiment-01
    - name: test-name
      value: replicas-6
    - name: scaled-object
      value: ""
    - name: initial-replicas
      value: "6"
    # P-2: Sudden Spike — 0.1 req/s baseline, then 10x at t=15 min
    - name: load-steps
      value:
        - |
          name: baseline
          delay: 0
          duration: 2100
          scenario: |
            request_type: text_completions
            profile: constant
            rate: 0.1
            data:
              prompt_tokens: 1024
              output_tokens: 1024
        - |
          name: burst
          delay: 900
          duration: 600
          scenario: |
            request_type: text_completions
            profile: constant
            rate: 1.0
            data:
              prompt_tokens: 1024
              output_tokens: 1024
  pipelineRef:
    name: wva-load-test
  taskRunTemplate:
    podTemplate:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - amd64
    serviceAccountName: pipeline
  timeouts:
    finally: 1h0m0s
    pipeline: 12h0m0s
    tasks: 4h0m0s
  workspaces:
    - name: shared-workspace
      volumeClaimTemplate:
        metadata:
          creationTimestamp: null
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 32Gi
        status: {}
