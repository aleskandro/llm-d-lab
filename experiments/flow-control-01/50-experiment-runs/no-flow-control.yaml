apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: flow-control-disabled-
  namespace: experiment-01
spec:
  params:
    - name: target-url
      value: "http://infra-inference-scheduling-inference-gateway-openshift-default.experiment-01.svc.cluster.local"
    - name: test-name
      value: flow-control-disabled
  pipelineRef:
    name: flow-control-2-streams
  taskRunTemplate:
    podTemplate:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - amd64
                  - key: benchmark.llm-d.ai/test-cpu-amd64
                    operator: In
                    values:
                      - 'true'
      tolerations:
        - key: "benchmark.llm-d.ai/test-cpu-amd64"
          effect: "NoSchedule"
    serviceAccountName: pipeline
  timeouts:
    finally: 1h0m0s
    pipeline: 12h0m0s
    tasks: 4h0m0s
  workspaces:
    - name: shared-workspace
      persistentVolumeClaim:
        claimName: benchmarks
