apiVersion: v1
kind: Service
metadata:
  name: nfs-server
  namespace: nfs-provisioner
  labels:
    app: nfs-server
  annotations:
    # Static IP required so NFS_SERVER env var can reference a stable IP
    # that kubelets can route to via kube-proxy
spec:
  type: ClusterIP
  # IMPORTANT: Set this to an available IP from your cluster's service CIDR
  # Example for typical service CIDR 10.96.0.0/16, use something like 10.96.100.100
  # Check your cluster's service CIDR with: kubectl cluster-info dump | grep service-cluster-ip-range
  clusterIP: 172.30.250.250
  ports:
  - name: nfs
    port: 2049
    targetPort: 2049
    protocol: TCP
  - name: rpcbind
    port: 111
    targetPort: 111
    protocol: TCP
  selector:
    app: nfs-server-provisioner
